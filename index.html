<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer - Professional Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* Professional Sidebar Design */
        #sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 300px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            color: #fff;
        }

        #sidebar-header {
            padding: 24px 20px;
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #sidebar-header p {
            color: #8888aa;
            font-size: 0.9rem;
        }

        #parts-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        #parts-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #parts-list li {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            font-weight: 500;
            color: #e0e0ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        #parts-list li:hover {
            background: rgba(100, 100, 255, 0.15);
            border-color: rgba(100, 100, 255, 0.3);
            transform: translateX(5px);
        }

        #parts-list li.selected {
            background: linear-gradient(135deg, #4a4aff, #6a4aff);
            border-color: #8a6aff;
            color: white;
            box-shadow: 0 5px 15px rgba(74, 74, 255, 0.3);
        }

        #parts-list li.selected::after {
            content: "✓";
            font-weight: 600;
            opacity: 0.8;
        }

        #stats {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: #8888aa;
            display: flex;
            justify-content: space-between;
        }

        #stats span {
            color: #fff;
            font-weight: 600;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4a4aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader p {
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .loader .percent {
            color: #4a4aff;
            font-weight: 600;
            margin-top: 10px;
        }

        /* Controls Info */
        #controls-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0a0ff;
            font-size: 0.85rem;
            display: flex;
            gap: 20px;
            z-index: 90;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            color: #fff;
            font-size: 0.9rem;
        }

        /* Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>3D Model Explorer</h2>
            <p>Click on any part to highlight</p>
        </div>
        
        <div id="parts-container">
            <ul id="parts-list"></ul>
        </div>
        
        <div id="stats">
            <span>Total Parts</span>
            <span id="parts-count">0</span>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader">
            <div class="spinner"></div>
            <p>Loading 3D Model</p>
            <div class="percent" id="loading-percent">0%</div>
        </div>
    </div>

    <!-- Controls Info -->
    <div id="controls-info">
        <div class="control-item">
            <span class="key">LMB</span>
            <span>Rotate</span>
        </div>
        <div class="control-item">
            <span class="key">RMB</span>
            <span>Pan</span>
        </div>
        <div class="control-item">
            <span class="key">Scroll</span>
            <span>Zoom</span>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        
        // --- Professional Lighting Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        
        // Renderer with anti-aliasing and shadows
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: false,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);
        
        // Controls - Auto rotation is DISABLED
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2;
        controls.minDistance = 3;
        controls.maxDistance = 20;
        controls.autoRotate = false; // Disabled as requested
        controls.enableZoom = true;
        controls.enablePan = true;
        
        // --- Professional Lighting System ---
        
        // 1. Ambient light for base illumination
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // 2. Main directional light (simulating sun)
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        const d = 10;
        mainLight.shadow.camera.left = -d;
        mainLight.shadow.camera.right = d;
        mainLight.shadow.camera.top = d;
        mainLight.shadow.camera.bottom = -d;
        mainLight.shadow.camera.near = 1;
        mainLight.shadow.camera.far = 15;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);
        
        // 3. Fill light from the back
        const backLight = new THREE.PointLight(0x4466aa, 0.8);
        backLight.position.set(-3, 2, -5);
        scene.add(backLight);
        
        // 4. Rim light for edge definition
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(-2, 1, 4);
        scene.add(rimLight);
        
        // 5. Additional accent lights
        const accentLight1 = new THREE.PointLight(0x66aaff, 0.4);
        accentLight1.position.set(3, 1, 2);
        scene.add(accentLight1);
        
        const accentLight2 = new THREE.PointLight(0xff66aa, 0.3);
        accentLight2.position.set(-1, 2, -3);
        scene.add(accentLight2);
        
        // 6. Hemisphere light for natural environment lighting
        const hemiLight = new THREE.HemisphereLight(0x445566, 0x221122, 0.5);
        scene.add(hemiLight);
        
        // Optional: Light helpers (commented out by default)
        // scene.add(new THREE.DirectionalLightHelper(mainLight));
        // scene.add(new THREE.PointLightHelper(backLight));
        
        // --- No grid or helpers - removed as requested ---
        
        // --- Variables ---
        let model = null;
        const parts = [];
        let selectedPart = null;
        const highlightColor = 0xffaa33;
        
        // --- Load Model ---
        const loader = new GLTFLoader();
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingPercent = document.getElementById('loading-percent');
        
        loader.load(
            'eye5.glb',
            (gltf) => {
                model = gltf.scene;
                scene.add(model);
                
                // Hide loading overlay with fade
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                }, 500);
                
                // Collect and filter parts
                collectParts(model);
                
                // Center and scale model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                // Adjust camera to fit model
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraDistance = maxDim / (2 * Math.tan(fov / 2));
                cameraDistance *= 1.5; // Add some margin
                
                camera.position.set(center.x, center.y + maxDim * 0.3, center.z + cameraDistance);
                controls.target.copy(center);
                controls.update();
                
                console.log('Model loaded successfully');
            },
            (xhr) => {
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                loadingPercent.textContent = `${percent}%`;
            },
            (error) => {
                console.error('Error loading model:', error);
                loadingOverlay.innerHTML = '<div style="color: white; background: rgba(255,0,0,0.8); padding: 20px; border-radius: 10px;">Error loading model. Check console.</div>';
            }
        );
        
        // --- Filter and collect parts (skip objects with "Object" in name) ---
        function collectParts(obj) {
            obj.traverse((child) => {
                if (child.isMesh) {
                    const name = child.name || '';
                    
                    // Skip if name contains "Object" (case insensitive)
                    if (name.toLowerCase().includes('object')) {
                        return;
                    }
                    
                    // Skip if no name or default name
                    if (!name || name === '') {
                        return;
                    }
                    
                    const partInfo = {
                        name: name,
                        mesh: child,
                        originalMaterial: Array.isArray(child.material) 
                            ? child.material.map(m => m.clone()) 
                            : child.material.clone()
                    };
                    
                    parts.push(partInfo);
                    
                    // Enable shadows
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            // Sort parts alphabetically
            parts.sort((a, b) => a.name.localeCompare(b.name));
            
            updatePartsList();
            document.getElementById('parts-count').textContent = parts.length;
        }
        
        // --- Update sidebar list ---
        function updatePartsList() {
            const listElement = document.getElementById('parts-list');
            listElement.innerHTML = '';
            
            parts.forEach((part, index) => {
                const li = document.createElement('li');
                li.textContent = part.name;
                li.dataset.index = index;
                
                li.addEventListener('click', () => {
                    highlightPart(part);
                    
                    // Update selection in list
                    document.querySelectorAll('#parts-list li').forEach(item => {
                        item.classList.remove('selected');
                    });
                    li.classList.add('selected');
                });
                
                listElement.appendChild(li);
            });
        }
        
        // --- Highlight selected part ---
        function highlightPart(part) {
            // Reset previous selection
            if (selectedPart) {
                resetPartMaterial(selectedPart);
            }
            
            // Apply highlight to new part
            if (part && part.mesh) {
                // Create highlight material
                if (Array.isArray(part.mesh.material)) {
                    part.mesh.material = part.mesh.material.map((mat, i) => {
                        const originalMat = Array.isArray(part.originalMaterial) ? part.originalMaterial[i] : part.originalMaterial;
                        const highlightMat = originalMat.clone();
                        highlightMat.emissive.setHex(highlightColor);
                        highlightMat.emissiveIntensity = 0.7;
                        highlightMat.needsUpdate = true;
                        return highlightMat;
                    });
                } else {
                    const highlightMat = part.originalMaterial.clone();
                    highlightMat.emissive.setHex(highlightColor);
                    highlightMat.emissiveIntensity = 0.7;
                    highlightMat.needsUpdate = true;
                    part.mesh.material = highlightMat;
                }
                
                selectedPart = part;
            }
        }
        
        // --- Reset material to original ---
        function resetPartMaterial(part) {
            if (part && part.mesh && part.originalMaterial) {
                part.mesh.material = part.originalMaterial;
            }
        }
        
        // --- Window resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // --- Animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Update controls
            controls.update();
            
            // Render scene
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
