<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>3D Anatomical Model Viewer — Educational</title>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #f0f4f8;
        --bg-panel: #ffffff;
        --bg-panel2: #f8fafc;
        --accent: #1a5276;
        --accent2: #2980b9;
        --accent-light: #d6eaf8;
        --gold: #c9a227;
        --gold-light: #fdf3dc;
        --text-main: #1a2332;
        --text-sub: #4a5568;
        --text-muted: #8fa3b1;
        --border: #d1dde8;
        --shadow: 0 4px 24px rgba(26, 82, 118, 0.1);
        --shadow-deep: 0 8px 40px rgba(26, 82, 118, 0.18);
        --radius: 16px;
        --radius-sm: 10px;
        --transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-main);
        font-family: "Inter", "DM Sans", sans-serif;
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: fixed;
        color: var(--text-main);
      }

      /* ─── HEADER BAR ─── */
      .header-bar {
        background: var(--accent);
        color: white;
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
        box-shadow: 0 2px 12px rgba(26, 82, 118, 0.25);
        flex-shrink: 0;
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-logo .icon {
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }

      .header-logo h1 {
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .header-logo span {
        font-size: 0.78rem;
        opacity: 0.7;
        font-weight: 400;
      }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .badge-edu {
        background: var(--gold);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 4px 12px;
        border-radius: 20px;
        letter-spacing: 1px;
      }

      .btn-collapse-header {
        background: rgba(255, 255, 255, 0.12);
        border: none;
        color: white;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
      }
      .btn-collapse-header:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      /* ─── MAIN LAYOUT ─── */
      .app-body {
        display: flex;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 56px);
      }

      /* ─── SIDEBAR ─── */
      #sidebar {
        width: 300px;
        min-width: 300px;
        background: var(--bg-panel);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        height: 100%;
        z-index: 50;
        transition:
          width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          min-width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }

      #sidebar.collapsed {
        width: 0;
        min-width: 0;
        transform: translateX(100%);
      }

      .sidebar-head {
        background: var(--bg-panel2);
        border-bottom: 1px solid var(--border);
        padding: 18px 20px 14px;
      }

      .sidebar-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .sidebar-title .dot {
        width: 8px;
        height: 8px;
        background: var(--accent2);
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      .parts-counter {
        font-size: 0.78rem;
        color: var(--text-muted);
        background: var(--accent-light);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 14px;
        display: inline-block;
        font-weight: 600;
        color: var(--accent);
      }

      .sidebar-search {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-search input {
        width: 100%;
        padding: 8px 12px 8px 36px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: "Inter", sans-serif;
        font-size: 0.85rem;
        background: var(--bg-main);
        color: var(--text-main);
        outline: none;
        transition: var(--transition);
        direction: ltr;
      }

      .sidebar-search input:focus {
        border-color: var(--accent2);
        box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.12);
      }

      .search-wrap {
        position: relative;
      }

      .search-wrap .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 0.9rem;
        pointer-events: none;
      }

      #partsList {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #partsList::-webkit-scrollbar {
        width: 5px;
      }
      #partsList::-webkit-scrollbar-track {
        background: transparent;
      }
      #partsList::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }

      .part {
        padding: 11px 14px;
        background: var(--bg-panel2);
        cursor: pointer;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        font-size: 0.87rem;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-sub);
        font-weight: 500;
        transition: var(--transition);
        word-break: break-word;
        position: relative;
        overflow: hidden;
      }

      .part::before {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: transparent;
        border-radius: 2px;
        transition: var(--transition);
      }

      .part:hover {
        border-color: var(--accent2);
        background: var(--accent-light);
        color: var(--accent);
        transform: translateX(-3px);
      }

      .part:hover::before {
        background: var(--accent2);
      }

      .part.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: 0 4px 14px rgba(26, 82, 118, 0.3);
        transform: translateX(-3px);
      }

      .part.active::before {
        background: var(--gold);
      }

      .part-number {
        width: 22px;
        height: 22px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
        flex-shrink: 0;
        color: inherit;
      }

      .part:not(.active) .part-number {
        background: var(--border);
        color: var(--text-muted);
      }

      /* ─── TOGGLE SIDEBAR BTN ─── */
      #toggleSidebar {
        position: absolute;
        right: 300px;
        top: 50%;
        transform: translateY(-50%);
        width: 22px;
        height: 50px;
        background: var(--accent);
        border: none;
        border-radius: 8px 0 0 8px;
        color: white;
        cursor: pointer;
        z-index: 60;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        transition: var(--transition);
        box-shadow: -3px 0 12px rgba(0, 0, 0, 0.15);
      }

      #toggleSidebar:hover {
        background: var(--accent2);
      }
      #toggleSidebar.collapsed {
        right: 0;
        border-radius: 0 8px 8px 0;
      }

      /* ─── VIEWER CONTAINER ─── */
      .viewer-container {
        flex: 1;
        position: relative;
        background: #1a2332;
        overflow: hidden;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        background: radial-gradient(
          ellipse at 50% 60%,
          #1e3a5f 0%,
          #0d1b2a 100%
        );
        --poster-color: transparent;
        --progress-bar-color: var(--accent2);
        --progress-bar-height: 3px;
      }

      /* ─── LOADING ─── */
      .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(13, 27, 42, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 30;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .loading-overlay.show {
        opacity: 1;
        pointer-events: all;
      }

      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(41, 128, 185, 0.2);
        border-top-color: var(--accent2);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        color: white;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 1px;
        opacity: 0.85;
      }

      /* ─── INFO PANEL (top right) ─── */
      .info-panel {
        position: absolute;
        top: 16px;
        left: 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: var(--radius);
        padding: 18px 22px;
        max-width: 280px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-deep);
        transform: translateX(-120%);
        transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 20;
      }

      .info-panel.show {
        transform: translateX(0);
      }

      .info-label {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--accent2);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .info-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .info-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 6px;
        word-break: break-word;
      }

      .info-desc {
        font-size: 0.83rem;
        color: var(--text-sub);
        line-height: 1.6;
      }

      .info-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--accent-light);
        color: var(--accent);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-top: 10px;
      }

      /* ─── TOOLBAR ─── */
      .toolbar {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 20;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 10px 16px;
        border-radius: 50px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-deep);
      }

      .tool-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: transparent;
        border: 1.5px solid var(--border);
        color: var(--accent);
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        -webkit-tap-highlight-color: transparent;
        position: relative;
      }

      .tool-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(26, 82, 118, 0.3);
      }

      .tool-btn:active {
        transform: scale(0.92);
      }

      .tool-btn.active-toggle {
        background: var(--accent2);
        border-color: var(--accent2);
        color: white;
      }

      .tool-sep {
        width: 1px;
        background: var(--border);
        margin: 4px 2px;
      }

      /* Tooltips */
      .tool-btn::after {
        content: attr(data-tip);
        position: absolute;
        bottom: 48px;
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        background: var(--accent);
        color: white;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: var(--transition);
        font-family: "Inter", sans-serif;
      }

      .tool-btn:hover::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ─── ZOOM ─── */
      .zoom-controls {
        position: absolute;
        left: 16px;
        bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 20;
      }

      .zoom-btn {
        width: 38px;
        height: 38px;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        color: var(--accent);
        cursor: pointer;
        font-size: 1.3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        transition: var(--transition);
        box-shadow: var(--shadow);
        -webkit-tap-highlight-color: transparent;
      }

      .zoom-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: var(--shadow-deep);
      }

      .zoom-btn:active {
        transform: scale(0.92);
      }

      /* ─── STATUS BAR ─── */
      .status-bar {
        position: absolute;
        top: 16px;
        right: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 20;
      }

      .status-chip {
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 0.74rem;
        font-weight: 700;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: var(--shadow);
        letter-spacing: 0.5px;
      }

      .status-chip .indicator {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #27ae60;
      }

      /* ─── ANNOTATION on model ─── */
      .annotation {
        background: white;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--accent);
        border: 2px solid var(--accent2);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        white-space: nowrap;
        cursor: default;
      }

      /* ─── PROGRESS BAR CUSTOM ─── */
      .progress-wrap {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: transparent;
        z-index: 50;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent2), var(--gold));
        width: 0%;
        transition: width 0.4s ease;
      }

      /* ─── NO PARTS ─── */
      .no-parts {
        text-align: center;
        color: var(--text-muted);
        padding: 40px 20px;
        font-style: italic;
        background: var(--bg-main);
        border-radius: var(--radius-sm);
        border: 1.5px dashed var(--border);
        font-size: 0.85rem;
      }

      /* ─── RESPONSIVE ─── */
      @media (max-width: 768px) {
        #sidebar {
          position: absolute;
          right: 0;
          top: 0;
          bottom: 0;
          z-index: 80;
          border-left: none;
          box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
        }

        #sidebar.collapsed {
          transform: translateX(100%);
          width: 300px;
          min-width: 300px;
        }

        #toggleSidebar {
          right: 0;
        }

        #toggleSidebar:not(.collapsed) {
          right: 300px;
        }

        .info-panel {
          top: auto;
          bottom: 90px;
          left: 50%;
          transform: translateX(150%);
          max-width: 90vw;
        }

        .info-panel.show {
          transform: translateX(-50%);
        }

        .header-logo span {
          display: none;
        }
      }

      @media (max-width: 480px) {
        .toolbar {
          padding: 8px 10px;
          gap: 5px;
        }
        .tool-btn {
          width: 36px;
          height: 36px;
          font-size: 0.9rem;
        }
        .tool-btn::after {
          display: none;
        }
      }

      /* ─── HOVER TOUCH ─── */
      @media (hover: none) {
        .part:hover {
          transform: none;
        }
        .tool-btn:hover {
          transform: none;
        }
        .zoom-btn:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header-bar">
      <div class="header-logo">
        <div class="icon">🔬</div>
        <div>
          <h1>Anatomical Model Viewer</h1>
          <span>Interactive 3D Educational Platform</span>
        </div>
      </div>
      <div class="header-meta">
        <div class="badge-edu">ACADEMIC</div>
        <button
          class="btn-collapse-header"
          id="toggleSidebar"
          title="Toggle Panel"
        >
          ☰
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="app-body">
      <!-- VIEWER -->
      <div class="viewer-container" id="viewerWrap">
        <!-- Progress bar -->
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Loading overlay -->
        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
          <div class="loading-text" id="loadingText">Loading 3D Model...</div>
        </div>

        <!-- Model viewer -->
        <model-viewer
          id="viewer"
          src="eye2.glb"
          camera-controls
          shadow-intensity="1.2"
          exposure="1.4"
          environment-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
          auto-rotate
          rotation-per-second="12deg"
          interaction-prompt="none"
          touch-action="pan-y"
          camera-orbit="45deg 55deg 2.2m"
          min-camera-orbit="auto auto 1.0m"
          max-camera-orbit="auto auto 6m"
          field-of-view="30deg"
          interpolation-decay="80"
          loading="eager"
          reveal="auto"
          tone-mapping="aces"
          shadow-softness="0.6"
        >
        </model-viewer>

        <!-- Info Panel -->
        <div class="info-panel" id="infoPanel">
          <div class="info-label">Selected Component</div>
          <div class="info-name" id="infoTitle">Select a Component</div>
          <div class="info-desc" id="infoDesc">
            Click any part in the list to highlight it on the model
          </div>
          <div class="info-badge" id="infoBadge">
            <span>🔍</span>
            <span id="badgeText">Material Info</span>
          </div>
        </div>

        <!-- Status bar -->
        <div class="status-bar">
          <div class="status-chip" id="qualityChip">
            <div class="indicator"></div>
            <span id="qualityLabel">HDR Active</span>
          </div>
        </div>

        <!-- Zoom -->
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoomIn" title="Zoom In">+</button>
          <button class="zoom-btn" id="zoomOut" title="Zoom Out">−</button>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <button class="tool-btn" id="resetView" data-tip="Reset View">
            ⟲
          </button>
          <button
            class="tool-btn active-toggle"
            id="rotateToggle"
            data-tip="Auto Rotate"
          >
            ↻
          </button>
          <div class="tool-sep"></div>
          <button class="tool-btn" id="qualityToggle" data-tip="Toggle Quality">
            ✨
          </button>
          <button class="tool-btn" id="fullscreen" data-tip="Fullscreen">
            ⛶
          </button>
          <div class="tool-sep"></div>
          <button class="tool-btn" id="resetColors" data-tip="Reset Colors">
            🎨
          </button>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div id="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">
            <div class="dot"></div>
            Model Components
          </div>
          <div class="parts-counter" id="partsCounter">Loading...</div>
        </div>

        <div class="sidebar-search">
          <div class="search-wrap">
            <span class="search-icon">🔎</span>
            <input
              type="text"
              id="searchInput"
              placeholder="Search components..."
            />
          </div>
        </div>

        <div id="partsList"></div>
      </div>
    </div>

    <script>
      // ── Elements ──
      const viewer = document.getElementById("viewer");
      const list = document.getElementById("partsList");
      const loadingOv = document.getElementById("loadingOverlay");
      const loadingText = document.getElementById("loadingText");
      const progressBar = document.getElementById("progressBar");
      const partsCounter = document.getElementById("partsCounter");
      const infoPanel = document.getElementById("infoPanel");
      const infoTitle = document.getElementById("infoTitle");
      const infoDesc = document.getElementById("infoDesc");
      const badgeText = document.getElementById("badgeText");
      const searchInput = document.getElementById("searchInput");
      const sidebar = document.getElementById("sidebar");
      const toggleBtn = document.getElementById("toggleSidebar");
      const qualityLabel = document.getElementById("qualityLabel");
      const qualityChip = document.getElementById("qualityChip");

      // ── State ──
      const originalColors = new Map();
      const isMobile = window.innerWidth <= 768;
      let currentDistance = 2.2;
      let highQuality = true;
      let autoRotating = true;
      let sidebarOpen = true;

      const HIGHLIGHT_COLORS = [
        { rgb: [0.2, 0.6, 1, 1], name: "Blue" },
        { rgb: [0.2, 0.85, 0.4, 1], name: "Green" },
        { rgb: [1, 0.35, 0.25, 1], name: "Red" },
        { rgb: [1, 0.75, 0.1, 1], name: "Gold" },
        { rgb: [0.7, 0.3, 1, 1], name: "Purple" },
        { rgb: [0, 0.85, 0.85, 1], name: "Cyan" },
        { rgb: [1, 0.5, 0.1, 1], name: "Orange" },
      ];
      let colorIndex = 0;

      // ── Loading ──
      function showLoading(msg = "Loading...") {
        loadingText.textContent = msg;
        loadingOv.classList.add("show");
      }

      function hideLoading() {
        loadingOv.classList.remove("show");
      }

      // ── Save / Restore Colors ──
      function saveOriginalColors() {
        if (!viewer.model) return;
        viewer.model.materials.forEach((mat) => {
          if (!originalColors.has(mat.name)) {
            const c = mat.pbrMetallicRoughness.baseColorFactor;
            originalColors.set(mat.name, c ? [...c] : [1, 1, 1, 1]);
          }
        });
      }

      function restoreOriginalColors() {
        if (!viewer.model) return;
        viewer.model.materials.forEach((mat) => {
          const orig = originalColors.get(mat.name);
          if (orig) {
            mat.pbrMetallicRoughness.setBaseColorFactor(orig);
            mat.pbrMetallicRoughness.setRoughnessFactor(0.5);
            mat.pbrMetallicRoughness.setMetallicFactor(0);
          }
        });
      }

      // ── Highlight ──
      function highlightMaterial(materialName) {
        if (!viewer.model) return false;
        const col = HIGHLIGHT_COLORS[colorIndex % HIGHLIGHT_COLORS.length];
        let found = false;

        viewer.model.materials.forEach((mat) => {
          if (mat.name === materialName) {
            mat.pbrMetallicRoughness.setBaseColorFactor(col.rgb);
            mat.pbrMetallicRoughness.setRoughnessFactor(0.05);
            mat.pbrMetallicRoughness.setMetallicFactor(0.5);
            found = true;

            // Update info panel
            infoTitle.textContent = mat.name || "Component";
            infoDesc.textContent = `Material: ${mat.name || "unnamed"} — Click to inspect details`;
            badgeText.textContent = `${col.name} • Highlight Active`;
            infoPanel.classList.add("show");
          }
        });

        colorIndex++;
        return found;
      }

      // ── Focus Camera ──
      function focusCamera(matName) {
        if (!viewer.model) return;
        try {
          viewer.autoRotate = false;
          autoRotating = false;
          document
            .getElementById("rotateToggle")
            .classList.remove("active-toggle");

          const b = viewer.model.bounds;
          const dist = Math.max(b.size.x, b.size.y, b.size.z) * 1.8;
          viewer.cameraTarget = `${b.center.x}m ${b.center.y}m ${b.center.z}m`;
          viewer.cameraOrbit = `35deg 60deg ${dist}m`;
          currentDistance = dist;
        } catch (e) {}
      }

      // ── Build Part List ──
      function buildPartList(materials) {
        list.innerHTML = "";
        let count = 0;

        materials.forEach((mat, idx) => {
          if (!mat) return;
          const item = document.createElement("div");
          item.className = "part";
          item.setAttribute("data-name", mat.name || "");
          item.setAttribute("data-idx", idx);

          const num = document.createElement("div");
          num.className = "part-number";
          num.textContent = idx + 1;

          const label = document.createElement("span");
          label.textContent = mat.name || `Component ${idx + 1}`;

          item.append(num, label);

          item.addEventListener("click", () => {
            document
              .querySelectorAll(".part")
              .forEach((p) => p.classList.remove("active"));
            item.classList.add("active");
            restoreOriginalColors();
            highlightMaterial(mat.name);
            focusCamera(mat.name);
          });

          list.appendChild(item);
          count++;
        });

        partsCounter.textContent = `${count} Components`;
        return count;
      }

      // ── Search ──
      searchInput.addEventListener("input", () => {
        const q = searchInput.value.trim().toLowerCase();
        document.querySelectorAll(".part").forEach((p) => {
          const name = p.getAttribute("data-name").toLowerCase();
          p.style.display = name.includes(q) ? "" : "none";
        });
      });

      // ── Model Load ──
      showLoading("Loading 3D Model...");

      viewer.addEventListener("progress", (e) => {
        const pct = Math.round(e.detail.totalProgress * 100);
        progressBar.style.width = pct + "%";
        loadingText.textContent = `Loading model... ${pct}%`;
      });

      viewer.addEventListener("load", () => {
        progressBar.style.width = "100%";
        setTimeout(() => {
          progressBar.style.width = "0%";
        }, 600);
        hideLoading();

        if (!viewer.model?.materials?.length) {
          partsCounter.textContent = "No Components";
          list.innerHTML =
            '<div class="no-parts">No materials detected in this model</div>';
          return;
        }

        saveOriginalColors();
        const count = buildPartList(viewer.model.materials);

        if (count > 0) {
          setTimeout(() => {
            const first = list.querySelector(".part");
            if (first) first.click();
          }, 800);
        }
      });

      viewer.addEventListener("error", () => {
        hideLoading();
        loadingText.textContent = "Error loading model";
        loadingOv.classList.add("show");
      });

      // ── Sidebar Toggle ──
      function updateToggleBtn() {
        const collapsed = !sidebarOpen;
        sidebar.classList.toggle("collapsed", collapsed);
        toggleBtn.classList.toggle("collapsed", collapsed);

        if (isMobile) {
          toggleBtn.style.right = sidebarOpen ? "300px" : "0";
        } else {
          toggleBtn.style.right = sidebarOpen ? "300px" : "0";
        }
      }

      toggleBtn.addEventListener("click", () => {
        sidebarOpen = !sidebarOpen;
        updateToggleBtn();
      });

      // ── Zoom ──
      document.getElementById("zoomIn").addEventListener("click", () => {
        currentDistance = Math.max(1.0, currentDistance - 0.3);
        viewer.cameraOrbit = `45deg 55deg ${currentDistance}m`;
      });

      document.getElementById("zoomOut").addEventListener("click", () => {
        currentDistance = Math.min(6.0, currentDistance + 0.3);
        viewer.cameraOrbit = `45deg 55deg ${currentDistance}m`;
      });

      // ── Reset ──
      document.getElementById("resetView").addEventListener("click", () => {
        viewer.cameraOrbit = "45deg 55deg 2.2m";
        viewer.cameraTarget = "auto auto auto";
        currentDistance = 2.2;
        viewer.autoRotate = true;
        autoRotating = true;
        document.getElementById("rotateToggle").classList.add("active-toggle");
        restoreOriginalColors();
        document
          .querySelectorAll(".part")
          .forEach((p) => p.classList.remove("active"));
        infoPanel.classList.remove("show");
        colorIndex = 0;
      });

      // ── Rotate Toggle ──
      document.getElementById("rotateToggle").addEventListener("click", (e) => {
        autoRotating = !autoRotating;
        viewer.autoRotate = autoRotating;
        e.currentTarget.classList.toggle("active-toggle", autoRotating);
      });

      // ── Fullscreen ──
      document.getElementById("fullscreen").addEventListener("click", () => {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          document.getElementById("viewerWrap").requestFullscreen();
        }
      });

      // ── Quality Toggle ──
      document.getElementById("qualityToggle").addEventListener("click", () => {
        highQuality = !highQuality;
        if (highQuality) {
          viewer.shadowIntensity = "1.2";
          viewer.exposure = "1.4";
          viewer.setAttribute("tone-mapping", "aces");
          qualityLabel.textContent = "HDR Active";
          qualityChip.querySelector(".indicator").style.background = "#27ae60";
        } else {
          viewer.shadowIntensity = "0.5";
          viewer.exposure = "1.0";
          viewer.setAttribute("tone-mapping", "default");
          qualityLabel.textContent = "Performance Mode";
          qualityChip.querySelector(".indicator").style.background = "#e67e22";
        }
      });

      // ── Reset Colors ──
      document.getElementById("resetColors").addEventListener("click", () => {
        restoreOriginalColors();
        document
          .querySelectorAll(".part")
          .forEach((p) => p.classList.remove("active"));
        infoPanel.classList.remove("show");
        colorIndex = 0;
      });

      // ── Resize ──
      window.addEventListener("resize", () => {
        if (window.innerWidth <= 768) {
          toggleBtn.style.right = sidebarOpen ? "300px" : "0";
        }
      });

      // ── Touch fix ──
      if ("ontouchstart" in window) {
        document.addEventListener(
          "touchstart",
          (e) => {
            if (e.touches.length > 1) e.preventDefault();
          },
          { passive: false },
        );
      }

      // Init toggle button position
      toggleBtn.style.right = "300px";
    </script>
  </body>
</html>
